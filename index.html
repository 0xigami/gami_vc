<style>
  :root{
    --bg:#1C1C1C;
    --fg:#FFFFFF;
    --dim:rgba(255,255,255,.5);
    --orange:#ED9745;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    background:var(--bg);
    color:var(--fg);
    font-family:"Share Tech Mono",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    font-size:16px;
    line-height:1.7;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{
    min-height:100svh;
    display:flex;
    flex-direction:column;
    padding:clamp(20px,4vw,48px);
  }
  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:20px;
  }
  .logo{display:inline-flex;line-height:0}
  .logo .icon{height:clamp(40px,9vw,48px);width:auto;display:block}
  .brand{color:var(--dim);font-size:clamp(.85rem,2.2vw,.95rem)}
  main{
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px 0;
  }
  .bio{
    max-width:62ch;
    width:100%;
    font-size:clamp(1rem,2.6vw,1.125rem);
  }
  .bio + .bio{margin-top:1.7em}
  .bio a{
    color:var(--fg);
    text-decoration:underline;
    text-underline-offset:3px;
    text-decoration-thickness:1px;
  }
  .bio a:hover{color:var(--orange)}
  a:focus-visible{outline:1px solid var(--orange);outline-offset:3px}
  footer{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    gap:20px;
    color:var(--dim);
    font-size:clamp(.85rem,2.2vw,.95rem);
  }
  footer a{color:var(--dim);text-decoration:none}
  footer a:hover{color:var(--fg)}
  a{transition:color .3s ease}
  @media (max-width:600px){
    footer{flex-direction:column;align-items:center;text-align:center;gap:16px}
  }
  @media (prefers-reduced-motion: reduce){
    a{transition:none}
  }
</style>
